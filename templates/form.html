{% extends "base.html" %}
{% block title %}{{ title }} - Todoリスト{% endblock %}

{% block content %}
<div class="card">
  <h1>{{ title }}</h1>

  <form method="post" action="{{ url_for('edit_task', task_id=task.id) if task and task.id else url_for('add_task') }}">
    <div class="form-group">
      <label for="title">タイトル（必須）</label>
      <input type="text" id="title" name="title" value="{{ task.title if task else '' }}" required placeholder="例: 買い物に行く">
    </div>
    <div class="form-group">
      <label for="content">内容</label>
      <textarea id="content" name="content" placeholder="例: 牛乳、卵、パン">{{ task.content if task else '' }}</textarea>
    </div>
    <div class="form-group">
      <label for="due_date">期日</label>
      <input type="date" id="due_date" name="due_date" value="{{ task.due_date if task and task.due_date else '' }}">
    </div>
    <div class="form-group">
      <label for="priority">優先度</label>
      <select id="priority" name="priority">
        <option value="高" {{ 'selected' if task and task.priority == '高' else '' }}>高</option>
        <option value="中" {{ 'selected' if not task or task.priority == '中' else '' }}>中</option>
        <option value="低" {{ 'selected' if task and task.priority == '低' else '' }}>低</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('list_tasks') }}" class="btn btn-secondary">一覧に戻る</a>
  </form>
</div>
{% endblock %}
